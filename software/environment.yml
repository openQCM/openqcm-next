# openQCM NEXT - reproducible conda environment (recommended)
#
#   cd software
#   conda env create -f environment.yml
#   conda activate openqcm-next
#   python run.py
#
# Pinned to the tested versions (Python 3.9.12). PyQt is pinned to 5.9.2 because
# the GUI relies on the classic QtGui widget namespace (see requirements.txt).
# On Apple Silicon the defaults channel provides osx-64 builds, which run under
# Rosetta 2 (install Rosetta if prompted).
name: openqcm-next
channels:
  - defaults
dependencies:
  - python=3.9.12
  - pyqt=5.9.2
  - numpy=1.21.5
  - scipy=1.7.3
  - pyserial=3.5
  - pandas=1.4.2
  - matplotlib=3.5.1
  - pip
  - pip:
      - pyqtgraph==0.11.0
      - progressbar==2.5
